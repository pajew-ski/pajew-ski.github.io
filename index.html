    <!-- Runs before first paint: the js class hides the prerender snapshot for
         browsers that will mount React, the dark class prevents a white flash -->
    <script>
      document.documentElement.classList.add('js');
      if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.classList.add('dark');
      }
    </script>
