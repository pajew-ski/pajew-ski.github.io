<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Runs before first paint: the js class hides the prerender snapshot for
         browsers that will mount React, the dark class prevents a white flash -->
    <script>
      document.documentElement.classList.add('js');
      if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.classList.add('dark');
      }
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>Michael</title>
    <meta name="description" content="Michael: Data Scientist, Tänzer, Kreativer. Web-Visitenkarte mit Opus Purum, Prinzipien, Exocortex, Beziehungen und Lux Aperta Bavaria." />
    <link rel="llms.txt" href="/llms.txt" />
    <meta name="author" content="Michael Pajewski" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Michael Pajewski",
        "givenName": "Michael",
        "familyName": "Pajewski",
        "url": "https://pajew.ski/",
        "jobTitle": "Data Scientist",
        "description": "Data Scientist, Dancer, Creative.",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Regensburg",
          "addressRegion": "Bayern",
          "addressCountry": "DE"
        },
        "sameAs": [
          "https://github.com/pajew-ski",
          "https://youtube.com/@m_pajew_ski"
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
