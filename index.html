    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Applies the dark class before first paint so a refresh never flashes white -->
    <script>
      if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.classList.add('dark');
      }
    </script>

    <link rel="llms.txt" href="/llms.txt" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Michael",
        "url": "https://pajew-ski.github.io/",
        "jobTitle": "Data Scientist",
        "description": "Data Scientist, Dancer, Creative.",
        "sameAs": [
          "https://github.com/pajew-ski",
          "https://youtube.com/@m_pajew_ski"
        ]
      }
