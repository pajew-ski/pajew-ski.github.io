name: Deploy to GitHub Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # GitHub Pages serves HTML with a fixed 10-minute cache. A browser holding
      # the previous index.html would 404 on its hashed assets after a deploy,
      # so the previous generation's assets are carried into each new deployment.
      - name: Carry over previous assets for cached HTML
        run: |
          prev=$(curl -sf https://pajew-ski.github.io/ || true)
          for a in $(printf '%s' "$prev" | grep -o '/assets/[^"]*' | sort -u); do
            if [ ! -f "dist$a" ]; then
              mkdir -p "dist$(dirname "$a")"
              curl -sf "https://pajew-ski.github.io$a" -o "dist$a" || rm -f "dist$a"
            fi
          done

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
